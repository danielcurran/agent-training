services:
  mongo:
    image: mongo:6.0
    container_name: esr-indexing-mongo
    environment:
      MONGO_INITDB_DATABASE: esr-lab
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
