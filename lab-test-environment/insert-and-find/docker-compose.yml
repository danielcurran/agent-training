version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: insert-and-find-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: insert_find_lab
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
